<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Donations</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen">

<!-- HEADER -->
<header class="bg-orange-500 text-white p-4 shadow">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">All Donations 💰</h1>
        <a href="/admin" class="bg-white text-orange-500 px-3 py-1 rounded hover:bg-gray-100 transition">
            ⬅ Back
        </a>
    </div>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto mt-8 p-4">

    <div class="bg-white shadow rounded-lg overflow-x-auto">

        <!-- TABLE -->
        <table class="min-w-full text-sm text-gray-700">

            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="px-6 py-3 text-center">#</th>
                    <th class="px-6 py-3 text-left">Donor Name</th>
                    <th class="px-6 py-3 text-right">Amount</th>
                    <th class="px-6 py-3 text-left">Child</th>
                    <th class="px-6 py-3 text-left">Date</th>
                    <th class="px-6 py-3 text-center">Status</th>
                </tr>
            </thead>

            <tbody>

                <!-- DATA -->
                <tr th:each="donation, stat : ${donations}"
                    class="border-b hover:bg-gray-50">

                    <td class="px-6 py-3 text-center"
                        th:text="${stat.count}"></td>

                    <td class="px-6 py-3 font-medium"
                        th:text="${donation.donorName} ?: 'N/A'"></td>

                    <td class="px-6 py-3 text-right font-semibold text-green-600">
                        ₹ <span th:text="${donation.amount} ?: 0"></span>
                    </td>

                    <!-- 🔥 SAFE CHILD NAME (prevents white label error) -->
                    <td class="px-6 py-3"
                        th:text="${donation.child != null ? donation.child.name : 'No Child'}"></td>

                    <!-- DATE -->
                    <td class="px-6 py-3 text-gray-500"
                        th:text="${#temporals.format(donation.donatedAt, 'dd-MM-yyyy HH:mm')}"></td>

                    <!-- STATUS -->
                    <td class="px-6 py-3 text-center">
                        <span class="px-2 py-1 rounded text-xs font-bold"
                              th:classappend="${donation.status == 'PAID'} ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'"
                              th:text="${donation.status}">
                        </span>
                    </td>

                </tr>

            </tbody>

        </table>

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(donations)}"
             class="text-center text-gray-500 py-6">
            No donations found 😔
        </div>

    </div>

</main>

</body>
</html>
