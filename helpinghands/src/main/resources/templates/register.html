<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="bg-white p-6 rounded shadow w-96">
    <h2 class="text-2xl font-bold mb-4">Register</h2>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <p class="text-red-500 mb-2" th:text="${error}"></p>
        <label>Username</label>
        <input type="text" th:field="*{username}" class="w-full border p-2 rounded mb-3" required>
        <label>Email</label>
        <input type="email" th:field="*{email}" class="w-full border p-2 rounded mb-3" required>
        <label>Password</label>
        <input type="password" th:field="*{password}" class="w-full border p-2 rounded mb-4" required>
        <button class="w-full bg-blue-500 text-white py-2 rounded">Register</button>
    </form>
    <p class="mt-3 text-sm">Already have an account? <a href="/login" class="text-blue-500">Login</a></p>
</div>
</body>
</html>
