<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thank You</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="bg-white p-6 rounded shadow-md w-full max-w-md text-center">
    <h2 class="text-3xl font-bold mb-4">Thank You!</h2>
    <p th:text="'Thank you, ' + ${donorName} + ', for donating ₹' + ${amount} + '!'"></p>
    <a href="/children" class="mt-4 inline-block bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
        Back to Children
    </a>
</div>
</body>
</html>
