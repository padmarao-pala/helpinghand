<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Children</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f5f7fa, #e4ecf7);
        }

        .card-box {
            border-radius: 15px;
        }

        .table img {
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }

        .header-title {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .btn-sm i {
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- 🔥 HEADER -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">

        <span class="navbar-brand header-title">
            ❤️ Admin Panel - Manage Children
        </span>

        <!-- BACK BUTTON -->
        <a href="/admin" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>

    </div>
</nav>

<!-- 🔥 MAIN CONTENT -->
<div class="container mt-4">

    <!-- ✅ SUCCESS / ERROR MESSAGES -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- TOP BAR -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold">Children List</h4>

        <a href="/add-child" class="btn btn-success shadow-sm">
            <i class="bi bi-plus-circle"></i> Add Child
        </a>
    </div>

    <!-- TABLE CARD -->
    <div class="card shadow-lg border-0 card-box">
        <div class="card-body p-0">

            <table class="table table-hover align-middle text-center mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>Disease</th>
                        <th>Required</th>
                        <th>Collected</th>
                        <th>Progress</th>
                        <th>Actions</th>
                    </tr>
                </thead>

             <tbody>

<tr th:each="child : ${children}">

    <td th:text="${child.id}"></td>

    <td>
        <img th:src="@{'/uploads/' + ${child.imageName}}"
             width="50" height="50">
    </td>

    <td class="fw-semibold" th:text="${child.name}"></td>

    <td>
        <span class="badge bg-warning text-dark"
              th:text="${child.disease}"></span>
    </td>

    <!-- REQUIRED -->
    <td>
        ₹<span th:text="${child.requiredAmount}"></span>
    </td>

    <!-- 🔥 COLLECTED -->
    <td>
        <span class="text-success fw-bold">
            ₹<span th:text="${donationMap[child.id] != null ? donationMap[child.id] : 0}"></span>
        </span>
    </td>

    <!-- 🔥 PROGRESS -->
    <td style="width:200px;">
        <div th:with="
            collected=${donationMap[child.id] != null ? donationMap[child.id] : 0},
            required=${child.requiredAmount != null ? child.requiredAmount : 0},
            percent=${required > 0 ? (collected * 100 / required) : 0}
        ">

            <!-- Progress Bar -->
            <div class="progress" style="height:10px; border-radius:10px;">
                <div class="progress-bar bg-success"
                     th:style="'width:' + ${percent} + '%'">
                </div>
            </div>

            <!-- Percentage -->
            <div class="small mt-1 text-muted">
                <span th:text="${percent}"></span>%
            </div>

        </div>
    </td>

    <!-- ACTIONS -->
    <td>
        <a th:href="@{'/edit-child/' + ${child.id}}"
           class="btn btn-primary btn-sm me-1">
            <i class="bi bi-pencil-square"></i>
        </a>

        <a th:href="@{'/delete-child/' + ${child.id}}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Are you sure to delete this child?');">
            <i class="bi bi-trash"></i>
        </a>
    </td>

</tr>

<!-- EMPTY -->
<tr th:if="${#lists.isEmpty(children)}">
    <td colspan="8" class="text-muted py-4">
        No children available
    </td>
</tr>

</tbody>
            </table>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
