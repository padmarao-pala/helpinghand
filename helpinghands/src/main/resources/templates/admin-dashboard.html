<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f1f5f9;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: #0f172a;
            color: white;
            padding: 20px;
            position: fixed;
            width: 230px;
        }

        .sidebar a {
            color: #cbd5e1;
            display: block;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        .sidebar .active {
            background: #2563eb;
            color: white;
        }

        /* CONTENT */
        .content {
            margin-left: 250px;
            padding: 25px;
        }

        /* CARD */
        .stat-card {
            border-radius: 18px;
            padding: 20px;
            color: white;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 30px;
            opacity: 0.8;
        }

        /* SMALL CARD */
        .mini-card {
            border-radius: 15px;
            padding: 15px;
        }

        .quick-btn {
            border-radius: 12px;
            padding: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .quick-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="fw-bold mb-4">❤️ Admin</h4>

    <a href="/admin" class="active">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="/admin/children">
        <i class="bi bi-people"></i> Children
    </a>

    <a href="/admin/donations">
        <i class="bi bi-cash-stack"></i> Donations
    </a>

    <a href="/admin/contacts">
        <i class="bi bi-envelope"></i> Contacts
    </a>

    <hr>

    <a href="/logout" class="text-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Dashboard Overview</h3>
    </div>

    <!-- MAIN STATS -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="stat-card shadow" style="background: linear-gradient(135deg,#3b82f6,#2563eb);">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Total Children</small>
                        <h2 th:text="${totalChildren}">0</h2>
                    </div>
                    <i class="bi bi-people-fill stat-icon"></i>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card shadow" style="background: linear-gradient(135deg,#10b981,#059669);">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Total Donations</small>
                        <h2 th:text="${totalDonations}">0</h2>
                    </div>
                    <i class="bi bi-cash-stack stat-icon"></i>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card shadow" style="background: linear-gradient(135deg,#f59e0b,#d97706);">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Total Amount</small>
                        <h2>₹<span th:text="${totalAmount}">0</span></h2>
                    </div>
                    <i class="bi bi-currency-rupee stat-icon"></i>
                </div>
            </div>
        </div>

    </div>

    <!-- SECOND ROW -->
    <div class="row g-4 mt-2">

        <div class="col-md-6">
            <div class="bg-white shadow mini-card">
                <h6 class="text-muted">🏆 Top Funded Child</h6>
                <h5 class="fw-bold" th:text="${topChildName}">Name</h5>
                <p class="text-success fw-bold mb-0">
                    ₹<span th:text="${topAmount}">0</span>
                </p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="bg-white shadow mini-card">
                <h6 class="text-muted">❗ Pending Cases</h6>
                <h3 class="text-danger fw-bold" th:text="${pendingCases}">0</h3>
            </div>
        </div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="mt-5">
        <h5 class="fw-bold mb-3">Quick Actions</h5>

        <div class="row g-3">

            <div class="col-md-4">
                <a href="/add-child" class="btn btn-primary w-100 quick-btn shadow">
                    <i class="bi bi-plus-circle"></i> Add Child
                </a>
            </div>

            <div class="col-md-4">
                <a href="/admin/children" class="btn btn-success w-100 quick-btn shadow">
                    <i class="bi bi-list-check"></i> Manage Children
                </a>
            </div>

            <div class="col-md-4">
                <a href="/admin/donations" class="btn btn-warning w-100 quick-btn shadow">
                    <i class="bi bi-cash"></i> View Donations
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
