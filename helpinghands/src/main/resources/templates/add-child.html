<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Child</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-body p-5">

            <h2 class="mb-4 text-center text-success">
                Add Child
            </h2>

            <form th:action="@{/save-child}"
                  th:object="${child}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- NAME -->
                <div class="mb-3">

                    <label class="form-label">
                        Child Name
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{name}"
                           required>

                </div>

                <!-- DISEASE -->
                <div class="mb-3">

                    <label class="form-label">
                        Disease
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{disease}"
                           required>

                </div>

                <!-- REQUIRED AMOUNT -->
                <div class="mb-3">

                    <label class="form-label">
                        Required Amount
                    </label>

                    <input type="number"
                           class="form-control"
                           th:field="*{requiredAmount}"
                           required>

                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">

                    <label class="form-label">
                        Medical Story
                    </label>

                    <textarea class="form-control"
                              th:field="*{description}"
                              rows="6"
                              placeholder="Enter medical story..."
                              required>
                    </textarea>

                </div>

                <!-- IMAGE -->
                <div class="mb-4">

                    <label class="form-label">
                        Upload Image
                    </label>

                    <input type="file"
                           class="form-control"
                           name="imageFile"
                           required>

                </div>

                <!-- BUTTONS -->
                <div class="d-flex gap-3">

                    <button type="submit"
                            class="btn btn-success">

                        Add Child

                    </button>

                    <a href="/admin/children"
                       class="btn btn-secondary">

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
